# Site settings
title: GoHarsha.com
email: hello@goharsha.com

# Development mode, to enable it, use _development.yml along with _config.yml
# jekyll serve --watch --config _config.yml,_development.yml
development: false

description: >
  GoHarsha.com showcases the Programming World of Sri Harsha Chilakapati.
  It is where he enjoys writing about programming, his experiences and his
  tutorials.

permalink: "blog/:title/"
baseurl: ""

url: "https://goharsha.com"

# Blog pagination
pagination:
  enabled: true
  per_page: 5
  permalink: '/page:num/'
  collection: 'posts'
  sort_field: 'date'
  sort_reverse: true

# Build settings
markdown: kramdown
highlighter: rouge

# Markdown settings
kramdown:
  input: "GFM"
  syntax-highlighter: rouge

# Server settings
host: "localhost"
port: 8080

# List of plugins for the website to compile
plugins:
  - jekyll-paginate-v2

# Exclude certain files from Jekyll generation
exclude:
  [
    "LICENSE",
    "README.md",
    ".gitignore",
    ".tern-project",
    "sitespeed-result",
    "node_modules",
    ".obsidian",
    "vendor",
    ".github",
  ]
